<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flyers Semana Santa - Diócesis de Aguascalientes</title>
    <style>
        /* --- ESTILOS GENERALES --- */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #222; /* Fondo oscuro para resaltar los flyers */
        }

        /* --- 1. EL CINTILLO (BARRA SUPERIOR) --- */
        .cintillo {
            background-color: #7a2682; /* Color morado (tradicional de Semana Santa) */
            display: flex;
            align-items: center; /* Centra el logo y los botones verticalmente */
            padding: 10px 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            position: sticky; /* Hace que el cintillo se quede fijo arriba al hacer scroll */
            top: 0;
            z-index: 1000;
        }

        /* Logo de la Diócesis en el cintillo */
        .logo-diocesis {
            height: 60px; /* Alto del logo superior */
            margin-right: 20px;
        }

        /* Contenedor de los 13 botones */
        .contenedor-botones {
            display: flex;
            flex-wrap: wrap; /* Si no caben, se pasan al renglón de abajo */
            gap: 5px; /* Espacio entre botones */
        }

        /* Estilo de cada botón */
        .boton-nav {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
            transition: 0.3s;
        }

        .boton-nav:hover { background-color: rgba(255, 255, 255, 0.3); }
        .boton-nav.activo { background-color: white; color: #4b0082; font-weight: bold; }

        /* --- 2. ÁREA DEL FLYER (CONTENIDO) --- */
        .area-flyer {
            display: none; /* Se ocultan todos al principio */
            position: relative; /* Para poner logos y textos encima */
            width: 100%;
            max-width: 1000px; /* Ancho máximo para que no se vea gigante en PC */
            margin: 20px auto; /* Centra el flyer en la pantalla */
            background-color: #000;
        }

        /* La imagen grande del flyer */
        .imagen-fondo {
            width: 100%;
            display: block;
        }

        /* Logo de tu parroquia sobre el flyer */
        .logo-parroquia {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 90px;
            border-radius: 5px;
        }

        /* Nombre de tu parroquia sobre el flyer */
        .nombre-parroquia {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>

        <img src="logo-diocesis.png" alt="Diócesis de Aguascalientes" class="logo-diocesis">

    <script>
        function cambiarFlyer(evento, idFlyer) {
            // 1. Ocultar todos los flyers
            let flyers = document.getElementsByClassName("area-flyer");
            for (let i = 0; i < flyers.length; i++) {
                flyers[i].style.display = "none";
            }

            // 2. Quitar el estado "activo" (color blanco) de todos los botones
            let botones = document.getElementsByClassName("boton-nav");
            for (let i = 0; i < botones.length; i++) {
                botones[i].className = botones[i].className.replace(" activo", "");
            }

            // 3. Mostrar el flyer que seleccionamos y pintar el botón correspondiente
            document.getElementById(idFlyer).style.display = "block";
            evento.currentTarget.className += " activo";
        }

        // Hacer que el "Día 1" aparezca automáticamente al abrir la página
        document.getElementById("botonInicio").click();
    </script>
